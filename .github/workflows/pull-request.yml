name: On Pull Request

on:
  push:
    branches:
      - main
  pull_request: {}

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run reviewable checks
        run: |
          make reviewable

  type-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run formatting check
        run: npm run format:check

      - name: Run ESLint and count errors
        id: count-errors
        run: |
          OUTPUT=$(npx eslint 'src/**/*.{js,ts,vue}' -f json) || true

          ERRORS=$(echo "$OUTPUT" | jq '[.[] | .messages[] | select(.severity == 2)] | length')
          WARNINGS=$(echo "$OUTPUT" | jq '[.[] | .messages[] | select(.severity == 1)] | length')

          echo "errors=$ERRORS" >> $GITHUB_OUTPUT
          echo "warnings=$WARNINGS" >> $GITHUB_OUTPUT

      - name: Publish ESLint summary
        run: |
          {
            echo "## 🧹 ESLint Report"
            echo
            echo "| Status | Count |"
            echo "|--------|-------|"
            echo "| ❌ Errors   | **${{ steps.count-errors.outputs.errors }}** |"
            echo "| ⚠️ Warnings | **${{ steps.count-errors.outputs.warnings }}** |"
            echo
            echo "---"
            echo "✅ Linting completed automatically by CI."
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Run type check
        run: npm run type-check
